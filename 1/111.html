<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>网站管理后台</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen">

<!-- 登录 -->
<div id="login" class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow p-8">
    <h2 class="text-2xl font-bold text-center mb-6">管理后台登录</h2>
    <div class="space-y-4">
      <div>
        <label class="block text-sm mb-1">账号</label>
        <input id="user" type="text" class="w-full border border-gray-300 rounded-lg px-4 py-2" placeholder="请输入账号">
      </div>
      <div>
        <label class="block text-sm mb-1">密码</label>
        <input id="pass" type="password" class="w-full border border-gray-300 rounded-lg px-4 py-2" placeholder="请输入密码">
      </div>
      <button onclick="goLogin()" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">登录</button>
    </div>
  </div>
</div>

<!-- 主后台 -->
<div id="admin" class="hidden flex h-screen overflow-hidden">
  <!-- 侧边栏 -->
  <aside class="w-64 bg-white shadow h-full hidden md:block" id="sidebar">
    <div class="h-16 flex items-center justify-center border-b font-bold text-lg">网站管理</div>
    <nav class="p-4 space-y-1">
      <button onclick="goPage('home')" class="w-full flex items-center gap-2 px-3 py-2 rounded bg-blue-50 text-blue-600 nav-btn" data-page="home">
        <i class="fa fa-tachometer"></i> 控制台
      </button>
      <button onclick="goPage('content')" class="w-full flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-100 nav-btn" data-page="content">
        <i class="fa fa-file-text-o"></i> 内容管理
      </button>
      <button onclick="goPage('setting')" class="w-full flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-100 nav-btn" data-page="setting">
        <i class="fa fa-cog"></i> 网站设置
      </button>
    </nav>
  </aside>

  <!-- 主体 -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6">
      <button class="md:hidden text-xl" onclick="toggleSide()"><i class="fa fa-bars"></i></button>
      <div class="flex items-center gap-4">
        <span>管理员</span>
        <button onclick="logout()" class="text-red-500">退出</button>
      </div>
    </header>

    <main class="flex-1 overflow-auto p-6">
      <!-- 控制台 -->
      <div id="page-home" class="block">
        <h2 class="text-xl font-bold mb-4">控制台概览</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white p-5 rounded shadow">今日访问：128</div>
          <div class="bg-white p-5 rounded shadow">内容总数：26</div>
          <div class="bg-white p-5 rounded shadow">管理员在线</div>
        </div>
      </div>

      <!-- 内容管理 -->
      <div id="page-content" class="hidden">
        <h2 class="text-xl font-bold mb-4">内容管理</h2>
        <div class="bg-white rounded shadow p-4 mb-4">
          <button class="bg-blue-600 text-white px-4 py-2 rounded mb-4">+ 新增内容</button>
          <table class="w-full text-left">
            <thead>
              <tr class="border-b">
                <th class="py-2">标题</th>
                <th>时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr class="border-b">
                <td class="py-3">网站首页介绍</td>
                <td>2026-04-13</td>
                <td>
                  <button class="text-blue-600 mr-3">编辑</button>
                  <button class="text-red-500">删除</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 网站设置 -->
      <div id="page-setting" class="hidden">
        <h2 class="text-xl font-bold mb-4">网站设置</h2>
        <div class="bg-white rounded shadow p-6 space-y-4">
          <div>
            <label class="block mb-1 text-sm">网站名称</label>
            <input type="text" class="w-full border rounded px-3 py-2" value="我的网站">
          </div>
          <div>
            <label class="block mb-1 text-sm">网站关键词</label>
            <input type="text" class="w-full border rounded px-3 py-2">
          </div>
          <button class="bg-blue-600 text-white px-4 py-2 rounded">保存设置</button>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
function goLogin(){
  let u = document.getElementById('user').value;
  let p = document.getElementById('pass').value;

  // 固定账号密码
  if(u === 'admin' && p === 'admin888'){
    document.getElementById('login').classList.add('hidden');
    document.getElementById('admin').classList.remove('hidden');
  }else{
    alert('账号或密码错误');
  }
}

function logout(){
  document.getElementById('admin').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
}

function goPage(page){
  document.querySelectorAll('[id^="page-"]').forEach(e=>e.classList.add('hidden'));
  document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('bg-blue-50','text-blue-600'));
  document.getElementById('page-'+page).classList.remove('hidden');
  document.querySelector(`[data-page="${page}"]`).classList.add('bg-blue-50','text-blue-600');
}

function toggleSide(){
  let s = document.getElementById('sidebar');
  s.classList.toggle('hidden');
}
</script>
</body>
</html>
