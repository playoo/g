<!doctype html>
<html lang="zh-CN">
<head>
<title>Plyr HLS播放器</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="spm_prefix" content="457.19">
<!-- CDN引入，无需本地文件 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.min.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.min.js"></script>
<style>
    * {
        margin: 0;
        border: 0;
        padding: 0;
        text-decoration: none;
        box-sizing: border-box;
    }
    body, html {
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
        background: #000;
    }
    #video-box {
        width: 100%;
        height: 100%;
        position: relative;
    }
    video {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }
    /* 深色模式变量修正，不遮挡控件 */
    body.dark {
        --plyr-color-main: #409eff;
        --plyr-audio-controls-background: #374251;
        --plyr-control-icon-color: #fff;
        --plyr-control-text-color: #fff;
        --plyr-border-color: #222;
    }
    .audiodiv {
        border-radius: 5px;
        overflow: visible !important; /* 关键：禁止裁切底部控制栏 */
        border: 1px solid var(--plyr-border-color,#eee);
    }
    /* 强制显示Plyr控制栏，覆盖浏览器默认样式 */
    .plyr__controls {
        display: flex !important;
        opacity: 1 !important;
        visibility: visible !important;
    }
</style>
</head>
<body>
<div id="video-box" class="audiodiv">
    <video 
        id="video-player" 
        playsinline 
        controls 
        data-poster="./vbg.webp" 
        data-plyr-config='{ "ratio": "16:9" }'>
        <source type="application/x-mpegURL" />
    </video>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const video = document.getElementById('video-player');
    const sourceDom = video.querySelector('source');
    let hls = null;
    const DEFAULT_M3U8 = 'https://v.lzcdn31.com/20260217/2672_989986af/index.m3u8';

    // 获取url参数
    function getUrlParam(paramName) {
        const params = new URLSearchParams(window.location.search);
        const val = params.get(paramName);
        return val ? decodeURIComponent(val) : '';
    }
    let playUrl = getUrlParam('url') || DEFAULT_M3U8;

    if (!playUrl.endsWith('.m3u8')) {
        playUrl = DEFAULT_M3U8;
    }

    const plyrLang = {
        speed: '倍速',
        normal: '正常',
        playbackRates: '播放速度',
        quality: '清晰度',
        loop: '循环',
        mute: '静音',
        unmute: '取消静音',
        volume: '音量',
        captions: '字幕',
        settings: '设置',
        fullscreen: '全屏',
        exitFullscreen: '退出全屏',
        pip: '画中画'
    };

    // ==========关键修复：移除移动端禁用enabled，强制全端启用控件==========
    const player = new Plyr(video, {
        i18n: plyrLang,
        resetOnEnd: true,
        keyboard: { focused: true, global: true },
        tooltips: { controls: true, seek: true },
        storage: { enabled: true, key: 'plyr' },
        controls: [
            'play-large', // 中间大播放按钮
            'play',
            'progress',
            'current-time',
            'mute',
            'volume',
            'speed',
            'settings',
            'fullscreen'
        ], // 手动指定要显示的控件，防止自动隐藏
        hideControls: false, // 禁止自动隐藏控件
        autopause: false
    });
    window.player = player;

    function destroyHls() {
        if (hls) {
            hls.destroy();
            hls = null;
        }
        video.src = '';
        sourceDom.src = '';
    }

    function loadVideo(url) {
        destroyHls();
        sourceDom.src = url;
        if (Hls.isSupported()) {
            hls = new Hls({
                maxBufferLength: 30,
                maxMaxBufferLength: 60
            });
            hls.loadSource(url);
            hls.attachMedia(video);
            window.hls = hls;

            player.on('languagechange', () => {
                setTimeout(() => {
                    if (hls.subtitleTracks.length) {
                        hls.subtitleTrack = player.currentTrack ?? -1;
                    }
                }, 50);
            });

            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    switch(data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            hls.recoverMediaError();
                            break;
                        default:
                            destroyHls();
                            break;
                    }
                }
            });
        } else if (video.canPlayType('application/x-mpegURL')) {
            video.src = url;
        }
    }

    loadVideo(playUrl);

    window.addEventListener('beforeunload', destroyHls);
});

// 深色模式逻辑不变
window.main = {};
function getCookie(name) {
    const arr = document.cookie.split('; ');
    for(let i=0;i<arr.length;i++){
        const item = arr[i].split('=');
        if(item[0] === name) return item[1];
    }
    return null;
}
const darkCookie = getCookie('dark');
if(darkCookie === 'dark') main.SwitchDarkMode(true);

main.SwitchDarkMode = function(dark){
    if(dark){
        document.body.classList.add('dark');
        document.cookie = 'dark=dark;path=/;max-age=2592000';
    }else{
        document.body.classList.remove('dark');
        document.cookie = 'dark=light;path=/;max-age=2592000';
    }
}

main.channel = function () {
    if(window.BroadcastChannel){
        const channel = new BroadcastChannel('zeze_channel');
        channel.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                main.SwitchDarkMode(data.DarkMode === 'dark');
            } catch(e) {}
        };
        window.addEventListener('beforeunload', () => channel.close());
    }
}
main.channel();
</script>
</body>
</html>
